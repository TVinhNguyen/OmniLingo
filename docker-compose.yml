
services:
  # ──────────────────────────────────────────────────
  # PostgreSQL — Core OLTP (identity, learning, srs, billing, etc.)
  # ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnilingo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omnilingo
      POSTGRES_PASSWORD: omnilingo_dev
      POSTGRES_DB: omnilingo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnilingo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # MongoDB — Content store
  # ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: omnilingo-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: omnilingo
      MONGO_INITDB_ROOT_PASSWORD: omnilingo_dev
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Redis — Cache, session, leaderboard, rate limit
  # ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnilingo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────
  # Kafka — Event bus
  # ──────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: omnilingo-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────────
  # ClickHouse — Analytics
  # ──────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: omnilingo-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: omnilingo
      CLICKHOUSE_PASSWORD: omnilingo_dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Minio — S3-compatible object storage (local dev)
  # ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: omnilingo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: omnilingo
      MINIO_ROOT_PASSWORD: omnilingo_dev
    ports:
      - "9100:9000"  # S3 API
      - "9001:9001"  # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # RabbitMQ — Task queue (transcode, email)
  # ──────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: omnilingo-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: omnilingo
      RABBITMQ_DEFAULT_PASS: omnilingo_dev
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────
  # Prometheus — Metrics Collection
  # ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: omnilingo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # ──────────────────────────────────────────────────
  # Grafana — Visualizations
  # ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: omnilingo-grafana
    restart: unless-stopped
    ports:
      - "3011:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  minio_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
