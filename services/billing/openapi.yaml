openapi: 3.1.0
info:
  title: OmniLingo Billing Service API
  version: 1.0.0
  description: Plan catalog, subscription, invoices, and payment success webhook endpoints.
servers:
  - url: http://localhost:3010
    description: Local development
  - url: https://staging-api.omnilingo.com/billing
    description: Staging
tags:
  - name: infrastructure
  - name: plans
  - name: subscription
  - name: invoices
  - name: webhooks
paths:
  /healthz:
    get:
      tags: [infrastructure]
      operationId: getHealth
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HealthResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /readyz:
    get:
      tags: [infrastructure]
      operationId: getReady
      responses:
        "200": { description: Ready, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { description: Not ready, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
  /metrics:
    get:
      tags: [infrastructure]
      operationId: getMetrics
      responses:
        "200": { description: Prometheus exposition format, content: { text/plain: { schema: { type: string } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/plans:
    get:
      tags: [plans]
      operationId: listPlans
      responses:
        "200": { description: Active plans, content: { application/json: { schema: { $ref: "#/components/schemas/PlansResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/plans/{code}:
    get:
      tags: [plans]
      operationId: getPlan
      parameters:
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Plan, content: { application/json: { schema: { type: object, required: [plan], properties: { plan: { $ref: "#/components/schemas/Plan" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/subscription:
    get:
      tags: [subscription]
      operationId: getSubscription
      security: [{ bearerJwt: [] }]
      responses:
        "200": { description: Current subscription, content: { application/json: { schema: { type: object, required: [subscription], properties: { subscription: { $ref: "#/components/schemas/Subscription" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [subscription]
      operationId: createSubscription
      security: [{ bearerJwt: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSubscriptionRequest" }
      responses:
        "201": { description: Subscription created, content: { application/json: { schema: { type: object, required: [subscription], properties: { subscription: { $ref: "#/components/schemas/Subscription" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/subscription/{id}:
    delete:
      tags: [subscription]
      operationId: cancelSubscription
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
        - in: query
          name: immediately
          schema: { type: boolean, default: false }
      responses:
        "200": { description: Subscription canceled, content: { application/json: { schema: { $ref: "#/components/schemas/MessageResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/invoices:
    get:
      tags: [invoices]
      operationId: listInvoices
      security: [{ bearerJwt: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200": { description: Invoices, content: { application/json: { schema: { $ref: "#/components/schemas/InvoicesResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/invoices/{id}:
    get:
      tags: [invoices]
      operationId: getInvoice
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Invoice, content: { application/json: { schema: { type: object, required: [invoice], properties: { invoice: { $ref: "#/components/schemas/Invoice" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/billing/webhooks/payment-success:
    post:
      tags: [webhooks]
      operationId: paymentSuccessWebhook
      parameters:
        - in: header
          name: X-Webhook-Signature
          required: false
          schema: { type: string }
          description: HMAC-SHA256 signature in sha256=<hex> format when WEBHOOK_SECRET is configured.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentSuccessRequest" }
      responses:
        "200": { description: Webhook received, content: { application/json: { schema: { $ref: "#/components/schemas/WebhookResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
components:
  securitySchemes:
    bearerJwt: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    BadRequest: { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    Unauthorized: { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    NotFound: { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    InternalError: { description: Internal server error, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties: { ok: { type: boolean }, service: { type: string }, version: { type: string } }
    ReadyResponse:
      type: object
      required: [ready, checks]
      properties: { ready: { type: boolean }, checks: { type: object, additionalProperties: { type: string } } }
    Plan:
      type: object
      required: [code, name, tier, price_cents, currency, interval, features, is_active]
      properties:
        code: { type: string }
        name: { type: string }
        tier: { type: string }
        price_cents: { type: integer }
        currency: { type: string }
        interval: { type: string }
        features: { type: array, items: { type: string } }
        is_active: { type: boolean }
    PlansResponse:
      type: object
      required: [plans]
      properties:
        plans: { type: array, items: { $ref: "#/components/schemas/Plan" } }
    Subscription:
      type: object
      required: [id, user_id, plan_code, status, provider, cancel_at_period_end, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        plan_code: { type: string }
        plan: { $ref: "#/components/schemas/Plan" }
        status: { type: string, enum: [trialing, active, past_due, canceled, expired] }
        provider: { type: string }
        provider_sub_id: { type: string }
        current_period_start: { type: string, format: date-time }
        current_period_end: { type: string, format: date-time }
        trial_end: { type: string, format: date-time }
        cancel_at_period_end: { type: boolean }
        canceled_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Invoice:
      type: object
      required: [id, user_id, amount_cents, currency, status, issued_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        subscription_id: { type: string, format: uuid }
        amount_cents: { type: integer }
        currency: { type: string }
        status: { type: string, enum: [open, paid, void, refunded] }
        provider_invoice_id: { type: string }
        description: { type: string }
        issued_at: { type: string, format: date-time }
        paid_at: { type: string, format: date-time }
        due_at: { type: string, format: date-time }
    CreateSubscriptionRequest:
      type: object
      required: [plan_code]
      properties:
        plan_code: { type: string }
        provider: { type: string, default: stripe }
        provider_sub_id: { type: string }
        trial_days: { type: integer }
    PaymentSuccessRequest:
      type: object
      required: [provider_sub_id]
      properties:
        provider: { type: string }
        provider_sub_id: { type: string }
        provider_invoice_id: { type: string }
        amount_cents: { type: integer }
        currency: { type: string }
    MessageResponse:
      type: object
      required: [message]
      properties: { message: { type: string } }
    WebhookResponse:
      type: object
      required: [received]
      properties:
        received: { type: boolean }
        duplicate: { type: boolean }
    InvoicesResponse:
      type: object
      required: [invoices, meta]
      properties:
        invoices: { type: array, items: { $ref: "#/components/schemas/Invoice" } }
        meta:
          type: object
          required: [total, limit, offset]
          properties:
            total: { type: integer }
            limit: { type: integer }
            offset: { type: integer }
