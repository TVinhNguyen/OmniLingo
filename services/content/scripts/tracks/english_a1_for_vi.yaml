        target_words: [water, tea, coffee, milk, juice]
        grammar_focus: null
        target_minutes: 7
      - id: like_food
        title: "Nói thích món ăn"
        target_words: [like, love, want, eat, drink]
        grammar_focus: "I like..."
        target_minutes: 7
      - id: ordering_food
        title: "Gọi món đơn giản"
        target_words: [menu, order, please, want]
        grammar_focus: "I want... please"
        target_minutes: 7
      - id: tastes
        title: "Vị của món ăn"
        target_words: [good, bad, hot, cold, sweet]
        grammar_focus: null
        target_minutes: 6
      - id: meals
        title: "Các bữa ăn"
        target_words: [breakfast, lunch, dinner, meal]
        grammar_focus: null
        target_minutes: 6
      - id: restaurant_words
        title: "Từ trong nhà hàng"
        target_words: [table, bill, waiter, restaurant]
        grammar_focus: null
        target_minutes: 7
      - id: food_review
        title: "Ôn tập ăn uống"
        target_words: [food, water, eat, drink, like, please]
        grammar_focus: null
        target_minutes: 8

  - id: daily_life
    title: "Đời sống hằng ngày"
    theme: daily_life
    lessons:
      - id: daily_actions
        title: "Hành động hằng ngày"
        target_words: [go, come, do, make, get]
        grammar_focus: null
        target_minutes: 7
      - id: places
        title: "Địa điểm quen thuộc"
        target_words: [school, work, home, market, park]
        grammar_focus: null
        target_minutes: 7
      - id: simple_routine
        title: "Lịch sinh hoạt đơn giản"
        target_words: [wake, sleep, study, work]
