        target_minutes: 8
      - id: transport
        title: "Đi lại"
        target_words: [bus, car, bike, walk, taxi]
        grammar_focus: null
        target_minutes: 7
      - id: weather
        title: "Thời tiết"
        target_words: [sunny, rainy, hot, cold, weather]
        grammar_focus: "It is..."
        target_minutes: 7
      - id: feelings
        title: "Cảm xúc cơ bản"
        target_words: [happy, sad, tired, hungry, thirsty]
        grammar_focus: "I am..."
        target_minutes: 7
      - id: simple_requests
        title: "Yêu cầu đơn giản"
        target_words: [help, open, close, read, write]
        grammar_focus: "Can you...?"
        target_minutes: 8
      - id: a1_review
        title: "Ôn tập A1 cơ bản"
        target_words: [hello, family, time, food, go, happy]
        grammar_focus: null
