track:
  id: english_a1_for_vi
  title: "English A1 for Vietnamese Learners"
  description: "Khoá học tiếng Anh từ con số 0 dành cho người Việt"
  source_lang: en
  ui_lang: vi
  cefr_level: A1

voice:
  primary: "21m00Tcm4TlvDq8ikWAM"
  fallback: "ErXwobaYiN019PkySvjV"

units:
  - id: greetings
    title: "Chào hỏi"
    theme: greetings
    lessons:
      - id: hello_basics
        title: "Hello & Hi"
        target_words: [hello, hi, hey, greetings]
        grammar_focus: null
        target_minutes: 5
      - id: introducing_yourself
        title: "Tự giới thiệu"
        target_words: [my, name, am, is]
        grammar_focus: "verb 'to be' (am/is)"
        target_minutes: 7
      - id: how_are_you
        title: "How are you?"
        target_words: [how, are, you, fine, thanks]
        grammar_focus: null
        target_minutes: 5
      - id: goodbye
        title: "Tạm biệt"
        target_words: [bye, goodbye, see, you, later]
        grammar_focus: null
        target_minutes: 5
      - id: polite_words
        title: "Từ lịch sự"
        target_words: [please, sorry, excuse, thank, welcome]
        grammar_focus: null
        target_minutes: 6
      - id: yes_no
        title: "Yes & No"
        target_words: [yes, no, not, okay]
        grammar_focus: "simple yes/no responses"
        target_minutes: 5
      - id: morning_evening
        title: "Morning & Evening"
        target_words: [morning, afternoon, evening, night]
        grammar_focus: null
        target_minutes: 6
      - id: classroom_greetings
        title: "Chào hỏi trong lớp"
        target_words: [teacher, student, class, ready]
        grammar_focus: null
        target_minutes: 6

  - id: family
    title: "Gia đình"
    theme: family
    lessons:
      - id: family_members
        title: "Thành viên gia đình"
        target_words: [family, mother, father, sister, brother]
        grammar_focus: null
        target_minutes: 7
      - id: parents_children
        title: "Cha mẹ và con cái"
        target_words: [parent, child, son, daughter]
        grammar_focus: null
        target_minutes: 6
      - id: possessives_my_your
        title: "My & Your"
        target_words: [my, your, his, her]
        grammar_focus: "possessive adjectives"
        target_minutes: 7
      - id: describing_family
        title: "Mô tả gia đình"
        target_words: [big, small, old, young]
        grammar_focus: "adjective before noun"
        target_minutes: 7
      - id: family_questions
        title: "Hỏi về gia đình"
        target_words: [who, this, that, they]
        grammar_focus: "Who is this?"
        target_minutes: 7
      - id: home_people
        title: "Người ở nhà"
        target_words: [home, house, people, live]
        grammar_focus: null
        target_minutes: 6
      - id: married_single
        title: "Tình trạng gia đình"
        target_words: [married, single, husband, wife]
        grammar_focus: null
        target_minutes: 6
      - id: family_review
        title: "Ôn tập gia đình"
        target_words: [family, mother, father, brother, sister, home]
        grammar_focus: null
        target_minutes: 8

  - id: numbers_time
    title: "Số và thời gian"
    theme: numbers_time
    lessons:
      - id: numbers_1_5
        title: "Số 1-5"
        target_words: [one, two, three, four, five]
        grammar_focus: null
        target_minutes: 5
      - id: numbers_6_10
        title: "Số 6-10"
        target_words: [six, seven, eight, nine, ten]
        grammar_focus: null
        target_minutes: 5
      - id: age_basics
        title: "Nói tuổi"
        target_words: [age, old, years, how]
        grammar_focus: "How old are you?"
        target_minutes: 7
      - id: days_week
        title: "Các ngày trong tuần"
        target_words: [day, week, monday, friday]
        grammar_focus: null
        target_minutes: 7
      - id: today_tomorrow
        title: "Hôm nay và ngày mai"
        target_words: [today, tomorrow, yesterday, now]
        grammar_focus: null
        target_minutes: 6
      - id: time_words
        title: "Từ chỉ thời gian"
        target_words: [time, hour, minute, late, early]
        grammar_focus: null
        target_minutes: 7
      - id: asking_time
        title: "Hỏi giờ"
        target_words: [what, time, is, it]
        grammar_focus: "What time is it?"
        target_minutes: 7
      - id: numbers_time_review
        title: "Ôn tập số và thời gian"
        target_words: [one, two, three, day, time, today]
        grammar_focus: null
        target_minutes: 8

