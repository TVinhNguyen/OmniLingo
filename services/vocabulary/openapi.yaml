openapi: 3.1.0
info:
  title: OmniLingo Vocabulary Service API
  version: 1.0.0
  description: Vocabulary catalog lookup, user deck/card management, and Anki import endpoints.
servers:
  - url: http://localhost:3004
    description: Local development
  - url: https://staging-api.omnilingo.com/vocabulary
    description: Staging
tags:
  - name: infrastructure
  - name: entries
  - name: decks
  - name: cards
  - name: import
  - name: admin
paths:
  /healthz:
    get:
      tags: [infrastructure]
      operationId: getHealth
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/HealthResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /readyz:
    get:
      tags: [infrastructure]
      operationId: getReady
      responses:
        "200": { description: Ready, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { description: Not ready, content: { application/json: { schema: { $ref: "#/components/schemas/ReadyResponse" } } } }
  /metrics:
    get:
      tags: [infrastructure]
      operationId: getMetrics
      responses:
        "200": { description: Prometheus exposition format, content: { text/plain: { schema: { type: string } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/entries/{id}:
    get:
      tags: [entries]
      operationId: getEntry
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Word entry, content: { application/json: { schema: { type: object, required: [word], properties: { word: { $ref: "#/components/schemas/Word" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/entries/search:
    post:
      tags: [entries]
      operationId: searchEntries
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SearchRequest" }
      responses:
        "200": { description: Search results, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResult" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/admin/words:
    post:
      tags: [admin]
      operationId: createWord
      security: [{ bearerJwt: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWordRequest" }
      responses:
        "201": { description: Word created, content: { application/json: { schema: { type: object, required: [word], properties: { word: { $ref: "#/components/schemas/Word" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/admin/words/{id}:
    patch:
      tags: [admin]
      operationId: updateWord
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateWordRequest" }
      responses:
        "200": { description: Word updated, content: { application/json: { schema: { type: object, required: [word], properties: { word: { $ref: "#/components/schemas/Word" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/decks:
    get:
      tags: [decks]
      operationId: listDecks
      security: [{ bearerJwt: [] }]
      responses:
        "200": { description: User decks, content: { application/json: { schema: { type: object, required: [decks], properties: { decks: { type: array, items: { $ref: "#/components/schemas/Deck" } } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
    post:
      tags: [decks]
      operationId: createDeck
      security: [{ bearerJwt: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDeckRequest" }
      responses:
        "201": { description: Deck created, content: { application/json: { schema: { type: object, required: [deck], properties: { deck: { $ref: "#/components/schemas/Deck" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/decks/{id}:
    get:
      tags: [decks]
      operationId: getDeck
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Deck, content: { application/json: { schema: { type: object, required: [deck], properties: { deck: { $ref: "#/components/schemas/Deck" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [decks]
      operationId: deleteDeck
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "204": { description: Deck deleted }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/decks/{id}/cards:
    post:
      tags: [cards]
      operationId: addCard
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddCardRequest" }
      responses:
        "201": { description: Card added, content: { application/json: { schema: { type: object, required: [card], properties: { card: { $ref: "#/components/schemas/UserCard" } } } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/decks/{deckId}/cards/{cardId}:
    delete:
      tags: [cards]
      operationId: removeCard
      security: [{ bearerJwt: [] }]
      parameters:
        - name: deckId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: cardId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Card removed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/cards/{id}/mark-known:
    post:
      tags: [cards]
      operationId: markKnown
      security: [{ bearerJwt: [] }]
      parameters:
        - $ref: "#/components/parameters/UuidId"
      responses:
        "200": { description: Card marked known, content: { application/json: { schema: { $ref: "#/components/schemas/MessageResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
  /api/v1/vocab/import/anki:
    post:
      tags: [import]
      operationId: importAnki
      security: [{ bearerJwt: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, language]
              properties:
                file:
                  type: string
                  format: binary
                language:
                  type: string
                deck_name:
                  type: string
      responses:
        "201": { description: Import completed, content: { application/json: { schema: { $ref: "#/components/schemas/AnkiImportResponse" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { description: Payload too large, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
        "500": { $ref: "#/components/responses/InternalError" }
components:
  securitySchemes:
    bearerJwt: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    UuidId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    BadRequest: { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    Unauthorized: { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    NotFound: { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
    InternalError: { description: Internal server error, content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } } }
  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties: { error: { type: string }, message: { type: string } }
    MessageResponse:
      type: object
      required: [message]
      properties: { message: { type: string } }
    HealthResponse:
      type: object
      required: [ok, service, version]
      properties: { ok: { type: boolean }, service: { type: string }, version: { type: string } }
    ReadyResponse:
      type: object
      required: [ready, checks]
      properties: { ready: { type: boolean }, checks: { type: object, additionalProperties: { type: string } } }
    WordMeaning:
      type: object
      required: [id, word_id, ui_language, meaning, order_idx]
      properties:
        id: { type: string, format: uuid }
        word_id: { type: string, format: uuid }
        ui_language: { type: string }
        meaning: { type: string }
        order_idx: { type: integer }
    WordExample:
      type: object
      required: [id, word_id, sentence, translation, audio_url]
      properties:
        id: { type: string, format: uuid }
        word_id: { type: string, format: uuid }
        sentence: { type: string }
        translation: { type: object, additionalProperties: { type: string } }
        audio_url: { type: string }
    Word:
      type: object
      required: [id, language, lemma, pos, ipa, frequency_rank, level, extra, meanings, examples, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        language: { type: string }
        lemma: { type: string }
        pos: { type: string }
        ipa: { type: string }
        frequency_rank: { type: integer }
        level: { type: string }
        extra: { type: object, additionalProperties: true }
        meanings: { type: array, items: { $ref: "#/components/schemas/WordMeaning" } }
        examples: { type: array, items: { $ref: "#/components/schemas/WordExample" } }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    SearchRequest:
      type: object
      required: [query, language]
      properties:
        query: { type: string }
        language: { type: string }
        level: { type: string }
        pos: { type: array, items: { type: string } }
        page: { type: integer, default: 1 }
        page_size: { type: integer, default: 20, maximum: 100 }
    SearchResult:
      type: object
      required: [words, total, page, page_size]
      properties:
        words: { type: array, items: { $ref: "#/components/schemas/Word" } }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
    Deck:
      type: object
      required: [id, owner_id, language, name, is_public, card_count, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        owner_id: { type: string, format: uuid }
        language: { type: string }
        name: { type: string }
        is_public: { type: boolean }
        card_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    UserCard:
      type: object
      required: [id, user_id, deck_id, word_id, suspended, added_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        deck_id: { type: string, format: uuid }
        word_id: { type: string, format: uuid }
        suspended: { type: boolean }
        added_at: { type: string, format: date-time }
        word: { $ref: "#/components/schemas/Word" }
    CreateDeckRequest:
      type: object
      required: [language, name]
      properties:
        language: { type: string }
        name: { type: string }
        is_public: { type: boolean }
    AddCardRequest:
      type: object
      required: [word_id]
      properties:
        word_id: { type: string, format: uuid }
    CreateMeaningRequest:
      type: object
      required: [ui_language, meaning, order_idx]
      properties:
        ui_language: { type: string }
        meaning: { type: string }
        order_idx: { type: integer }
    CreateExampleRequest:
      type: object
      required: [sentence, translation, audio_url]
      properties:
        sentence: { type: string }
        translation: { type: object, additionalProperties: { type: string } }
        audio_url: { type: string }
    CreateWordRequest:
      type: object
      required: [language, lemma, pos, ipa, frequency_rank, level, extra, meanings, examples]
      properties:
        language: { type: string }
        lemma: { type: string }
        pos: { type: string }
        ipa: { type: string }
        frequency_rank: { type: integer }
        level: { type: string }
        extra: { type: object, additionalProperties: true }
        meanings: { type: array, items: { $ref: "#/components/schemas/CreateMeaningRequest" } }
        examples: { type: array, items: { $ref: "#/components/schemas/CreateExampleRequest" } }
    UpdateWordRequest:
      type: object
      properties:
        language: { type: string }
        lemma: { type: string }
        pos: { type: string }
        ipa: { type: string }
        frequency_rank: { type: integer }
        level: { type: string }
        extra: { type: object, additionalProperties: true }
        meanings: { type: array, items: { $ref: "#/components/schemas/CreateMeaningRequest" } }
        examples: { type: array, items: { $ref: "#/components/schemas/CreateExampleRequest" } }
    AnkiImportResponse:
      type: object
      required: [message, deck_id, added, skipped, language]
      properties:
        message: { type: string }
        deck_id: { type: string, format: uuid }
        added: { type: integer }
        skipped: { type: integer }
        language: { type: string }
