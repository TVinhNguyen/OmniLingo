name: Load Test (k6)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Which k6 scenario to run'
        required: true
        default: 'dashboard'
        type: choice
        options:
          - dashboard
          - lesson-flow
          - api-burst
          - all
      target_url:
        description: 'Override BFF_URL (leave blank for staging)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  load-test:
    name: k6 Load Test (${{ inputs.scenario }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | \
            sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Determine target URLs
        id: urls
        run: |
          BFF="${{ inputs.target_url || vars.STAGING_BFF_URL || 'http://localhost:4000/graphql' }}"
          IDENTITY="${{ vars.STAGING_IDENTITY_URL || 'http://localhost:3001' }}"
          LEARNING="${{ vars.STAGING_LEARNING_URL || 'http://localhost:3002' }}"
          echo "bff=${BFF}" >> "$GITHUB_OUTPUT"
          echo "identity=${IDENTITY}" >> "$GITHUB_OUTPUT"
          echo "learning=${LEARNING}" >> "$GITHUB_OUTPUT"

      - name: Seed test users
        run: |
          k6 run \
            --env IDENTITY_URL=${{ steps.urls.outputs.identity }} \
            --env SEED_COUNT=200 \
            infrastructure/load-tests/k6/seed-users.js
        continue-on-error: true

      - name: Run dashboard load test
        if: ${{ inputs.scenario == 'dashboard' || inputs.scenario == 'all' }}
        run: |
          k6 run \
            --env BFF_URL=${{ steps.urls.outputs.bff }} \
            --env IDENTITY_URL=${{ steps.urls.outputs.identity }} \
            --out json=k6-dashboard-results.json \
            infrastructure/load-tests/k6/dashboard.js

      - name: Run lesson-flow load test
        if: ${{ inputs.scenario == 'lesson-flow' || inputs.scenario == 'all' }}
        run: |
          k6 run \
            --env BFF_URL=${{ steps.urls.outputs.bff }} \
            --env IDENTITY_URL=${{ steps.urls.outputs.identity }} \
            --env LEARNING_URL=${{ steps.urls.outputs.learning }} \
            --out json=k6-lesson-results.json \
            infrastructure/load-tests/k6/lesson-flow.js

      - name: Run api-burst test
        if: ${{ inputs.scenario == 'api-burst' || inputs.scenario == 'all' }}
        run: |
          k6 run \
            --env IDENTITY_URL=${{ steps.urls.outputs.identity }} \
            --env LEARNING_URL=${{ steps.urls.outputs.learning }} \
            --out json=k6-burst-results.json \
            infrastructure/load-tests/k6/api-burst.js

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results-${{ inputs.scenario }}-${{ github.run_id }}
          path: 'k6-*.json'
          retention-days: 30
